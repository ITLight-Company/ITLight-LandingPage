<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 – Strona nie istnieje | ITLight</title>
  <link rel="shortcut icon" type="image/png" href="assets/images/logo/favicon.ico" />
  <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .error-area {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(135deg, #361cc1 0%, #2e82ef 100%);
      color: #fff;
    }
    .error-area h1 {
      font-size: 120px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 10px;
    }
    .error-area p {
      font-size: 20px;
      margin-bottom: 30px;
      opacity: 0.85;
    }
    .error-area .main-btn {
      background: #fff;
      color: #361cc1;
      font-weight: 600;
    }
    .error-area .main-btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="error-area">
    <div>
      <h1>404</h1>
      <p>Strona, której szukasz, nie istnieje lub została przeniesiona.</p>
      <a href="index.html" class="main-btn">Wróć na stronę główną</a>
    </div>
  </div>
</body>
</html>
